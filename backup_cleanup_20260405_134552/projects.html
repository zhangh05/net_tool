<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetOps - 项目管理</title>
<link rel="stylesheet" href="/fontawesome.min.css">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; }

  .header {
    background: #1e40af;
    color: #fff;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header i { font-size: 24px; }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header small { opacity: 0.7; font-size: 13px; }

  .container { max-width: 960px; margin: 32px auto; padding: 0 16px; }

  .actions { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .btn {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
  }
  .btn-primary { background: #1e40af; color: #fff; }
  .btn-primary:hover { background: #1d3a9f; }
  .btn-outline { background: #fff; color: #374151; border: 1px solid #e5e7eb; }
  .btn-outline:hover { background: #f9fafb; }

  .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

  .project-card {
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    border: 2px solid transparent;
    transition: all 0.15s;
    position: relative;
  }
  .project-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); border-color: #dbeafe; }
  .project-card.active { border-color: #1e40af; background: #eff6ff; }

  .project-icon {
    width: 44px; height: 44px;
    background: #dbeafe;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    margin-bottom: 12px;
  }
  .project-name { font-size: 16px; font-weight: 600; color: #111827; margin-bottom: 4px; }
  .project-meta { font-size: 12px; color: #6b7280; margin-bottom: 8px; }
  .project-stats { font-size: 12px; color: #9ca3af; display: flex; gap: 12px; }

  .project-actions { display: flex; gap: 8px; margin-top: 14px; }
  .project-actions .btn { padding: 6px 12px; font-size: 12px; flex: 1; justify-content: center; }
  .btn-enter { background: #1e40af; color: #fff; }
  .btn-enter:hover { background: #1d3a9f; }
  .btn-delete { background: #fff; color: #dc2626; border: 1px solid #fecaca; }
  .btn-delete:hover { background: #fef2f2; }

  .empty { text-align: center; padding: 60px 20px; color: #9ca3af; }
  .empty i { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
  .empty p { font-size: 15px; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #fff;
    border-radius: 16px;
    padding: 28px;
    width: 420px;
    max-width: 90vw;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal h2 { font-size: 18px; margin-bottom: 16px; color: #111827; }
  .modal input {
    width: 100%; padding: 10px 14px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    margin-bottom: 16px;
  }
  .modal input:focus { border-color: #1e40af; box-shadow: 0 0 0 3px rgba(30,64,175,0.1); }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
  .modal-btns .btn { padding: 8px 18px; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #111827; color: #fff;
    padding: 10px 20px; border-radius: 8px;
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    z-index: 200;
  }
  .toast.show { opacity: 1; }
  .toast.error { background: #dc2626; }
  .toast.success { background: #16a34a; }

  .back-link {
    display: inline-flex; align-items: center; gap: 6px;
    color: #1e40af; text-decoration: none; font-size: 14px;
    padding: 16px 32px; display: block;
  }
  .back-link:hover { text-decoration: underline; }

  .loading { display: flex; align-items: center; justify-content: center; padding: 60px; color: #9ca3af; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid #e5e7eb;
    border-top-color: #1e40af;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .card-enter-btn { position: absolute; top: 16px; right: 16px; }

  /* AI Settings Modal */
  #aiSettingsModal {
    display: none; position: fixed; inset: 0; z-index: 350;
    background: rgba(15,25,45,0.5); align-items: center; justify-content: center;
    backdrop-filter: blur(8px);
  }
  #aiSettingsModal.show { display: flex; }

  .ai-modal {
    background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 16px;
    width: 480px; max-height: 88vh;
    display: flex; flex-direction: column;
    box-shadow: 0 24px 60px rgba(15,25,45,.12), 0 4px 16px rgba(0,0,0,.06);
    overflow: hidden;
  }

  /* Header */
  .ai-modal-header {
    padding: 22px 24px 18px;
    background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
    border-bottom: 1px solid #bfdbfe;
    display: flex; align-items: center; gap: 14px;
    position: relative;
  }
  .ai-modal-header::after {
    content: '';
    position: absolute; bottom: -1px; left: 24px; right: 24px; height: 1px;
    background: linear-gradient(to right, transparent, rgba(59,130,246,0.5), transparent);
  }
  .ai-hdr-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, #1e40af, #3b82f6);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #fff;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(59,130,246,0.35);
  }
  .ai-hdr-text span { display: block; font-size: 16px; font-weight: 700; color: #1e3a8a; }
  .ai-hdr-text small { font-size: 11px; color: #60a5fa; margin-top: 2px; display: block; }
  .ai-modal-header .close-btn {
    margin-left: auto; background: rgba(30,64,175,0.08); border: none;
    color: #60a5fa; cursor: pointer; font-size: 16px; padding: 6px 10px; border-radius: 8px;
    transition: all 0.15s; line-height: 1;
  }
  .ai-modal-header .close-btn:hover { background: rgba(239,68,68,0.12); color: #ef4444; }

  /* Body */
  .ai-modal-body { padding: 0; overflow-y: auto; flex: 1; }

  /* Section */
  .ai-form-section { padding: 18px 24px; }
  .ai-form-section + .ai-form-section { border-top: 1px solid #e8eef5; }
  .ai-form-label {
    font-size: 10px; font-weight: 700; color: #94a3b8;
    text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px;
    display: flex; align-items: center; gap: 6px;
  }
  .ai-form-label::after { content: ''; flex: 1; height: 1px; background: #e8eef5; }

  /* Fields */
  .ai-field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .ai-field-row.full { grid-template-columns: 1fr; }
  .ai-field { position: relative; }
  .ai-field-icon {
    position: absolute; left: 11px; top: 30px; transform: translateY(-50%);
    color: #94a3b8; font-size: 12px; pointer-events: none;
  }
  .ai-field label {
    display: block; font-size: 11px; color: #64748b; margin-bottom: 5px; font-weight: 500;
  }
  .ai-field .ai-field-input {
    width: 100%; background: #ffffff; border: 1px solid #e2e8f0; color: #1e293b;
    border-radius: 8px; padding: 9px 12px 9px 32px; font-size: 13px; outline: none;
    box-sizing: border-box; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .ai-field .ai-field-input.no-icon { padding-left: 12px; }
  .ai-field .ai-field-input:focus {
    border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
  }
  .ai-field .ai-field-input::placeholder { color: #cbd5e1; }
  .ai-field-hint { font-size: 10px; color: #94a3b8; margin-top: 4px; }

  /* Advanced toggle */
  .ai-adv-toggle {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 24px; color: #3b82f6; font-size: 12px; font-weight: 600;
    cursor: pointer; user-select: none; border-top: 1px solid #e8eef5;
    transition: background 0.15s;
  }
  .ai-adv-toggle:hover { background: #f0f7ff; }
  .ai-adv-toggle i { transition: transform 0.25s; font-size: 10px; color: #3b82f6; }
  .ai-adv-toggle.open i { transform: rotate(180deg); }
  .ai-adv-panel { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
  .ai-adv-panel.open { max-height: 500px; }

  /* Test result */
  .ai-test-result { margin: 0 24px 14px; font-size: 12px; border-radius: 10px; padding: 10px 14px; display: none; white-space: pre-wrap; line-height: 1.6; }
  .ai-test-result.ok { display: block; background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
  .ai-test-result.err { display: block; background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }

  /* Footer */
  .ai-modal-footer { padding: 14px 24px; border-top: 1px solid #e8eef5; display: flex; gap: 10px; }
  .ai-modal-footer .ai-btn-test { margin-right: auto; }
  .ai-modal-footer .ai-btn-save { flex: 1; }
  .ai-btn { border: none; padding: 9px 18px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.15s; }
  .ai-btn-test { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
  .ai-btn-test:hover { background: #dcfce7; border-color: #86efac; }
  .ai-btn-save { background: #1e40af; color: #fff; }
  .ai-btn-save:hover { background: #1d4ed8; box-shadow: 0 4px 14px rgba(30,64,175,0.3); }
  .ai-btn-cancel { background: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; }
  .ai-btn-cancel:hover { background: #e2e8f0; color: #1e293b; }

  .header-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  .header-btn {
    background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.25);
    border-radius: 8px; padding: 8px 16px; font-size: 13px; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: all 0.15s;
  }
  .header-btn:hover { background: rgba(255,255,255,0.25); }
</style>
</head>
<body>

<div class="header">
  <i class="fa-solid fa-diagram-project"></i>
  <div>
    <h1>NetOps 项目管理</h1>
    <small>选择或新建项目，开始拓扑设计</small>
  </div>
  <div class="header-actions">
    <button class="header-btn" onclick="openAISettings()">
      <i class="fa-solid fa-robot"></i> AI 配置
    </button>
  </div>
</div>

<a href="/" class="back-link"><i class="fa-solid fa-arrow-left"></i> 返回拓扑编辑器</a>

<div class="container">
  <div class="actions">
    <button class="btn btn-primary" onclick="showNewModal()">
      ＋ 新建项目
    </button>
    <button class="btn btn-outline" onclick="loadProjects()">
      <i class="fa-solid fa-refresh"></i> 刷新
    </button>
  </div>

  <div id="projectGrid" class="project-grid">
    <div class="loading"><div class="spinner"></div>加载中...</div>
  </div>
</div>

<!-- New Project Modal -->
<div class="modal-overlay" id="newModal">
  <div class="modal">
    <h2>新建项目</h2>
    <input id="newProjName" placeholder="输入项目名称..." onkeydown="if(event.key==='Enter')createProject()" autofocus>
    <div class="modal-btns">
      <button class="btn btn-outline" onclick="hideNewModal()">取消</button>
      <button class="btn btn-primary" onclick="createProject()">创建</button>
    </div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal-overlay" id="delModal">
  <div class="modal">
    <h2>删除项目</h2>
    <p id="delProjName" style="font-size:14px;color:#374151;margin-bottom:16px;"></p>
    <p style="font-size:13px;color:#dc2626;margin-bottom:16px;">删除后无法恢复，确定要删除吗？</p>
    <div class="modal-btns">
      <button class="btn btn-outline" id="btn-del-cancel" onclick="closeDelModal()">取消</button>
      <button class="btn btn-delete" id="btn-del-confirm" onclick="confirmDel()">确认删除</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- AI Settings Modal -->
<div id="aiSettingsModal">
  <div class="ai-modal">
    <div class="ai-modal-header">
      <div class="ai-hdr-icon"><i class="fa-solid fa-robot"></i></div>
      <div class="ai-hdr-text">
        <span>AI 配置</span>
        <small>设置模型连接和生成参数</small>
      </div>
      <button class="close-btn" onclick="closeAISettings()">×</button>
    </div>
    <div class="ai-modal-body">

      <!-- 连接配置 -->
      <div class="ai-form-section">
        <div class="ai-form-label"><i class="fa-solid fa-plug"></i> 连接</div>
        <div class="ai-field-row full" style="margin-bottom:10px;">
          <div class="ai-field">
            <i class="fa-solid fa-link ai-field-icon"></i>
            <label>Base URL</label>
            <input id="ai-api-url" class="ai-field-input" placeholder="https://api.example.com/v1">
          </div>
        </div>
        <div class="ai-field-row">
          <div class="ai-field">
            <i class="fa-solid fa-microchip ai-field-icon"></i>
            <label>模型</label>
            <input id="ai-model" class="ai-field-input" placeholder="MiniMax-M2.5-highspeed">
          </div>
          <div class="ai-field">
            <i class="fa-solid fa-key ai-field-icon"></i>
            <label>API Key</label>
            <input id="ai-api-key" type="password" class="ai-field-input" placeholder="sk-...">
          </div>
        </div>
      </div>

      <!-- 高级配置（折叠） -->
      <div class="ai-adv-toggle" id="advToggle" onclick="toggleAdvanced()">
        <i class="fa-solid fa-chevron-down" id="advArrow"></i>
        高级配置
      </div>
      <div class="ai-adv-panel" id="advPanel">
        <div class="ai-form-section">
          <div class="ai-form-label"><i class="fa-solid fa-sliders"></i> 生成参数</div>
          <div class="ai-field-row" style="margin-bottom:10px;">
            <div class="ai-field">
              <label>Temperature <span style="color:#1e3a4d;font-size:10px;">(创造性)</span></label>
              <div style="display:flex;align-items:center;gap:10px;margin-top:4px;">
                <input id="ai-temperature" type="range" min="0" max="1" step="0.05" value="0.7" oninput="updateTempDisplay(this.value)" style="flex:1;accent-color:#3b82f6;">
                <span id="tempDisplay" style="color:#64748b;font-size:12px;min-width:34px;text-align:right;font-weight:600;">0.70</span>
              </div>
            </div>
            <div class="ai-field">
              <label>Max Tokens</label>
              <input id="ai-max-tokens" type="number" class="ai-field-input no-icon" placeholder="8192" value="8192" style="margin-top:22px;">
            </div>
          </div>
          <div class="ai-field">
            <label>系统提示词</label>
            <textarea id="ai-system-prompt" rows="3" class="ai-field-input no-icon" placeholder="定义 AI 助手的角色和能力..." style="resize:vertical;margin-top:4px;font-family:inherit;line-height:1.6;"></textarea>
            <div class="ai-field-hint">留空使用默认提示词</div>
          </div>
        </div>
      </div>

      <div id="ai-test-result" class="ai-test-result"></div>
    </div>
    <div class="ai-modal-footer">
      <button class="ai-btn ai-btn-test" onclick="testAI()">
        <i class="fa-solid fa-paper-plane"></i> 测试
      </button>
      <button class="ai-btn ai-btn-cancel" onclick="closeAISettings()">取消</button>
      <button class="ai-btn ai-btn-save" onclick="saveAISettings()">
        <i class="fa-solid fa-check"></i> 保存
      </button>
    </div>
  </div>
</div>
<script>
// ──────────────────────────────────────────
// State
// ──────────────────────────────────────────
var projects = [];
var currentProjId = null;
var deleteTargetId = null;

// ──────────────────────────────────────────
// Init
// ──────────────────────────────────────────
document.addEventListener('DOMContentLoaded', loadProjects);

// ──────────────────────────────────────────
// Load projects
// ──────────────────────────────────────────
function loadProjects() {
  var grid = document.getElementById('projectGrid');
  grid.innerHTML = '<div class="loading"><div class="spinner"></div>加载中...</div>';
  fetch('/api/projects/')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      projects = data || [];
      renderProjects();
    })
    .catch(function(err) {
      grid.innerHTML = '<div class="empty"><i class="fa-solid fa-folder-open"></i><p>加载失败: ' + err.message + '</p></div>';
    });
}

// ──────────────────────────────────────────
// Render
// ──────────────────────────────────────────
function renderProjects() {
  var grid = document.getElementById('projectGrid');
  if (projects.length === 0) {
    grid.innerHTML = '<div class="empty"><i class="fa-solid fa-folder-open"></i><p>还没有项目，点击「新建项目」创建第一个</p></div>';
    return;
  }
  var html = '';
  for (var i = 0; i < projects.length; i++) {
    var p = projects[i];
    html += '<div class="project-card">';
    html += '  <div class="project-icon" style="color:#eab308;"><i class="fa-solid fa-folder"></i></div>';
    html += '  <div class="project-name">' + escHtml(p.name || p.id) + '</div>';
    html += '  <div class="project-meta">创建于 ' + (p.created || '未知') + '</div>';
    html += '  <div class="project-stats">';
    html += '    <span><i class="fa-solid fa-server"></i> ' + (p.nodeCount || 0) + ' 个设备</span>';
    html += '    <span><i class="fa-solid fa-link"></i> ' + (p.edgeCount || 0) + ' 条连线</span>';
    html += '  </div>';
    html += '  <div class="project-actions">';
    html += '    <button class="btn btn-enter" data-proj-id="' + escAttr(p.id) + '"><i class="fa-solid fa-play"></i> 进入</button>';
    html += '    <button class="btn btn-delete" data-proj-id="' + escAttr(p.id) + '" data-proj-name="' + escAttr(p.name || p.id) + '" title="删除项目"><i class="fa-solid fa-trash"></i></button>';
    html += '  </div>';
    html += '</div>';
  }
  grid.innerHTML = html;
}

// ──────────────────────────────────────────
// Enter project
// ──────────────────────────────────────────
function enterProject(projId) {
  // Redirect to main page with this project
  window.location.href = '/' + encodeURIComponent(projId);
}

// ──────────────────────────────────────────
// New project modal
// ──────────────────────────────────────────
function showNewModal() {
  document.getElementById('newModal').classList.add('show');
  document.getElementById('newProjName').value = '';
  document.getElementById('newProjName').focus();
}
function hideNewModal() {
  document.getElementById('newModal').classList.remove('show');
}

function createProject() {
  var name = document.getElementById('newProjName').value.trim();
  if (!name) { toast('请输入项目名称', 'error'); return; }
  hideNewModal();
  var projId = document.getElementById('newProjName').value.trim();
  fetch('/api/projects/', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: name })
  }).then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) { toast(data.error, 'error'); loadProjects(); return; }
      toast('✓ 项目已创建：' + name, 'success');
      // Redirect to new project
      window.location.href = data.redirect || ('/' + encodeURIComponent(name));
    })
    .catch(function(err) {
      toast('创建失败: ' + err.message, 'error');
    });
}

// ──────────────────────────────────────────
// Project delete
// ──────────────────────────────────────────


// ──────────────────────────────────────────
// Toast
// ──────────────────────────────────────────
// Bind modal buttons via addEventListener (more reliable than onclick)
document.addEventListener('click', function(e) {
  if (e.target.closest('#btn-del-cancel')) {
    closeDelModal();
    return;
  }
  if (e.target.closest('#btn-del-confirm')) {
    confirmDel();
    return;
  }
}, true); // Use capture phase to catch events early

// Global click listener for project card buttons
document.addEventListener('click', function(e) {
  var enterBtn = e.target.closest('.btn-enter');
  if (enterBtn) {
    var id = enterBtn.dataset.projId;
    if (id) enterProject(id);
    return;
  }
  var delBtn = e.target.closest('.btn-delete');
  if (delBtn) {
    var id = delBtn.dataset.projId;
    var name = delBtn.dataset.projName;
    if (id) showDelModal(id, name);
    return;
  }
});

// ── Project Delete ─────────────────────────────────────────
var _delTargetId = null;

function showDelModal(id, name) {
  _delTargetId = id;
  document.getElementById('delProjName').textContent = name || id;
  var modal = document.getElementById('delModal');
  if (modal) modal.style.display = 'flex';
}

function closeDelModal() {
  _delTargetId = null;
  var modal = document.getElementById('delModal');
  if (modal) modal.style.display = 'none';
}

function confirmDel() {
  var id = _delTargetId;
  if (!id) { toast('没有选择要删除的项目', 'error'); return; }
  fetch('/api/projects/' + encodeURIComponent(id), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ _method: 'delete' })
  }).then(function(r) { return r.json(); })
    .then(function(data) {
      closeDelModal();
      toast('✓ 项目已删除', 'success');
      loadProjects();
    })
    .catch(function(err) {
      closeDelModal();
      toast('删除失败: ' + (err.message || '未知错误'), 'error');
    });
}

function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (type ? ' ' + type : '');
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 2500);
}

function escHtml(s) {
  s = String(s || '');
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s || '').replace(/'/g, '%27').replace(/"/g, '%22');
}

var _currentProvider = 'custom';

function toggleAdvanced() {
  var panel = document.getElementById('advPanel');
  var toggle = document.getElementById('advToggle');
  var isClosed = !panel.classList.contains('open');
  panel.classList.toggle('open', isClosed);
  toggle.classList.toggle('open', isClosed);
}

function updateTempDisplay(val) {
  document.getElementById('tempDisplay').textContent = parseFloat(val).toFixed(2);
}

function openAISettings() {
  document.getElementById('aiSettingsModal').classList.add('show');
  document.getElementById('ai-test-result').className = 'ai-test-result';
  document.getElementById('ai-test-result').style.display = 'none';
  document.getElementById('advPanel').classList.remove('open');
  document.getElementById('advToggle').classList.remove('open');

  fetch('/api/llm/settings')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      _settingsData = data;
      // Load values
      document.getElementById('ai-api-url').value = data.api_url || '';
      document.getElementById('ai-api-key').value = data.api_key && !data.api_key.includes('****') ? data.api_key : '';
      document.getElementById('ai-api-key').placeholder = data.api_key && data.api_key.includes('****') ? '(已保存 Key)' : 'sk-...';
      document.getElementById('ai-model').value = data.model || '';
      document.getElementById('ai-temperature').value = data.temperature || 0.7;
      document.getElementById('tempDisplay').textContent = parseFloat(data.temperature || 0.7).toFixed(2);
      document.getElementById('ai-max-tokens').value = data.max_tokens || 8192;
      document.getElementById('ai-system-prompt').value = data.system_prompt || '';
    })
    .catch(function() {});
}

function closeAISettings() {
  document.getElementById('aiSettingsModal').classList.remove('show');
}

function saveAISettings() {
  var payload = {
    temperature: parseFloat(document.getElementById('ai-temperature').value) || 0.7,
    max_tokens: parseInt(document.getElementById('ai-max-tokens').value) || 8192,
    system_prompt: document.getElementById('ai-system-prompt').value.trim(),
    api_url: document.getElementById('ai-api-url').value.trim(),
    model: document.getElementById('ai-model').value.trim(),
    api_key: document.getElementById('ai-api-key').value.trim()
  };

  fetch('/api/llm/settings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) { toast('保存失败: ' + data.error, 'error'); return; }
      toast('✓ AI 配置已保存', 'success');
      closeAISettings();
    })
    .catch(function(err) { toast('保存失败: ' + err.message, 'error'); });
}

function testAI() {
  var payload = {
    api_url: document.getElementById('ai-api-url').value.trim(),
    api_key: document.getElementById('ai-api-key').value.trim(),
    model: document.getElementById('ai-model').value.trim() || 'MiniMax-M2.5-highspeed'
  };
  var result = document.getElementById('ai-test-result');
  result.className = 'ai-test-result';
  result.textContent = '⏳ 测试中，请稍候...';
  result.style.display = 'block';
  fetch('/api/llm/test', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.ok) {
        result.className = 'ai-test-result ok';
        result.textContent = '✅ 连接成功！AI 响应: ' + (data.reply || '').slice(0, 150);
      } else {
        result.className = 'ai-test-result err';
        result.textContent = '❌ 连接失败: ' + (data.error || '未知错误');
      }
    })
    .catch(function(err) {
      result.className = 'ai-test-result err';
      result.textContent = '❌ 请求失败: ' + err.message;
    });
}
