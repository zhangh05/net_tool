<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - NetTool</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #080c14;
  min-height: 100vh;
  display: flex;
  font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
  color: #e2e8f0;
  overflow: hidden;
}

/* 背景装饰 */
.bg-grid {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

.bg-glow {
  position: fixed;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  filter: blur(120px);
  pointer-events: none;
}
.bg-glow-1 {
  top: -200px;
  left: -200px;
  background: rgba(59,130,246,0.12);
}
.bg-glow-2 {
  bottom: -200px;
  right: -200px;
  background: rgba(16,185,129,0.08);
}

/* 左侧品牌区 */
.brand {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 60px 80px;
}

.brand-logo {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 40px;
}

.brand-logo-icon {
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, #3b82f6, #1d4ed8);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  box-shadow: 0 8px 32px rgba(59,130,246,0.3);
}

.brand-logo-text {
  font-size: 28px;
  font-weight: 700;
  color: #f1f5f9;
  letter-spacing: 1px;
}

.brand-logo-text span {
  color: #3b82f6;
}

.brand h1 {
  font-size: 36px;
  font-weight: 700;
  color: #f1f5f9;
  margin-bottom: 16px;
  line-height: 1.3;
}

.brand p {
  font-size: 16px;
  color: #64748b;
  line-height: 1.8;
  max-width: 360px;
}

.brand-features {
  margin-top: 48px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.brand-feature {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 14px;
  color: #94a3b8;
}

.brand-feature-icon {
  width: 32px;
  height: 32px;
  background: rgba(59,130,246,0.1);
  border: 1px solid rgba(59,130,246,0.2);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

/* 右侧登录区 */
.login-area {
  width: 440px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 60px 60px;
  background: rgba(15,23,42,0.6);
  border-left: 1px solid rgba(255,255,255,0.06);
  backdrop-filter: blur(20px);
}

.login-title {
  font-size: 22px;
  font-weight: 600;
  color: #f1f5f9;
  margin-bottom: 8px;
}

.login-subtitle {
  font-size: 14px;
  color: #475569;
  margin-bottom: 36px;
}

/* 错误提示 */
.error-msg {
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.25);
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 20px;
  font-size: 13px;
  color: #fca5a5;
  display: flex;
  align-items: center;
  gap: 8px;
  animation: shake 0.4s ease;
}

.error-msg .icon {
  font-size: 16px;
  flex-shrink: 0;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-6px); }
  40%, 80% { transform: translateX(6px); }
}

/* 输入框 */
.form-group {
  margin-bottom: 20px;
}

.form-label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: #94a3b8;
  margin-bottom: 8px;
  letter-spacing: 0.3px;
}

.form-input-wrap {
  position: relative;
}

.form-input-wrap .input-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
  color: #475569;
  pointer-events: none;
  transition: color 0.2s;
}

.form-input {
  width: 100%;
  padding: 13px 14px 13px 44px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  color: #f1f5f9;
  font-size: 15px;
  outline: none;
  transition: all 0.2s;
}

.form-input::placeholder {
  color: #334155;
}

.form-input:focus {
  border-color: #3b82f6;
  background: rgba(59,130,246,0.06);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
}

.form-input:focus + .input-icon,
.form-input:focus ~ .input-icon {
  color: #3b82f6;
}

/* 记住登录 */
.form-options {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
  font-size: 13px;
  color: #475569;
}

.remember-me {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  color: #64748b;
}

.remember-me input[type="checkbox"] {
  width: 16px;
  height: 16px;
  accent-color: #3b82f6;
  cursor: pointer;
}

/* 登录按钮 */
.btn-login {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  border: none;
  border-radius: 10px;
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 16px rgba(59,130,246,0.3);
  letter-spacing: 1px;
}

.btn-login:hover {
  background: linear-gradient(135deg, #2563eb, #1d4ed8);
  box-shadow: 0 6px 24px rgba(59,130,246,0.4);
  transform: translateY(-1px);
}

.btn-login:active {
  transform: translateY(0);
}

/* 底部 */
.login-footer {
  margin-top: 32px;
  padding-top: 24px;
  border-top: 1px solid rgba(255,255,255,0.06);
  text-align: center;
  font-size: 12px;
  color: #334155;
}

.login-footer strong {
  color: #3b82f6;
  font-weight: 500;
}

/* 响应式 */
@media (max-width: 768px) {
  body { flex-direction: column; }
  .brand { display: none; }
  .login-area { width: 100%; border-left: none; padding: 40px 24px; }
}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow bg-glow-1"></div>
<div class="bg-glow bg-glow-2"></div>

<!-- 左侧品牌 -->
<div class="brand">
  <div class="brand-logo">
    <div class="brand-logo-icon">🛠</div>
    <div class="brand-logo-text">Net<span>Tool</span></div>
  </div>
  <h1>网络工程师<br>工具箱</h1>
  <p>统一管理网络运维工具，提升工作效率，保障网络安全</p>

  <div class="brand-features">
    <div class="brand-feature">
      <div class="brand-feature-icon">🌐</div>
      <span>拓扑编辑器 — 拖拽式网络设备管理</span>
    </div>
    <div class="brand-feature">
      <div class="brand-feature-icon">👥</div>
      <span>用户管理 — 细粒度权限控制</span>
    </div>
    <div class="brand-feature">
      <div class="brand-feature-icon">🧩</div>
      <span>插件生态 — 按需扩展更多工具</span>
    </div>
  </div>
</div>

<!-- 右侧登录 -->
<div class="login-area">
  <div class="login-title">欢迎回来</div>
  <div class="login-subtitle">请登录以继续使用 NetTool</div>

  {{#if error}}<div class="error-msg"><span class="icon">⚠</span>{{error}}</div>{{/if}}

  <form method="POST" action="/login/" autocomplete="off">
    <div class="form-group">
      <label class="form-label">用户名</label>
      <div class="form-input-wrap">
        <input type="text" name="username" class="form-input" placeholder="输入用户名" autofocus required>
        <span class="input-icon">👤</span>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">密码</label>
      <div class="form-input-wrap">
        <input type="password" name="password" class="form-input" placeholder="输入密码" required>
        <span class="input-icon">🔒</span>
      </div>
    </div>

    <div class="form-options">
      <label class="remember-me">
        <input type="checkbox" checked>
        <span>记住登录状态</span>
      </label>
    </div>

    <button type="submit" class="btn-login">登 录</button>
  </form>

  <div class="login-footer">
    默认账户 <strong>root</strong> / <strong>1234qazhh</strong>
  </div>
</div>

</body>
</html>
