<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - NetTool</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
.login-box {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 48px 40px;
  width: 360px;
  backdrop-filter: blur(10px);
}
.logo { text-align: center; margin-bottom: 32px; }
.logo-icon { font-size: 48px; margin-bottom: 12px; }
.logo-title { color: #fff; font-size: 24px; font-weight: 600; }
.logo-sub { color: rgba(255,255,255,0.5); font-size: 13px; margin-top: 4px; }
.error-msg {
  background: rgba(239,68,68,0.2);
  border: 1px solid rgba(239,68,68,0.4);
  color: #fca5a5;
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 16px;
  font-size: 13px;
  text-align: center;
}
.form-group { margin-bottom: 18px; }
.form-group label { display: block; color: rgba(255,255,255,0.7); font-size: 13px; margin-bottom: 6px; }
.form-group input {
  width: 100%;
  padding: 11px 14px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  color: #fff;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.form-group input:focus {
  border-color: #3b82f6;
  background: rgba(255,255,255,0.12);
}
.btn-login {
  width: 100%;
  padding: 12px;
  background: #3b82f6;
  border: none;
  border-radius: 8px;
  color: #fff;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-login:hover { background: #2563eb; }
.hint {
  text-align: center;
  margin-top: 20px;
  color: rgba(255,255,255,0.35);
  font-size: 12px;
}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">
    <div class="logo-icon">🔧</div>
    <div class="logo-title">NetTool</div>
    <div class="logo-sub">网络工程师工具箱</div>
  </div>
  
  {{error}}
  
  <form method="POST" action="/login/">
    <div class="form-group">
      <label>用户名</label>
      <input type="text" name="username" placeholder="请输入用户名" autofocus required>
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" name="password" placeholder="请输入密码" required>
    </div>
    <button type="submit" class="btn-login">登 录</button>
  </form>
  
  <div class="hint">默认账户: root / 1234qazhh</div>
</div>
</body>
</html>
