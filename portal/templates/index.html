<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetTool - 网络工程师工具箱</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0f172a;
  min-height: 100vh;
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  color: #e2e8f0;
}
/* 顶部导航 */
.header {
  background: rgba(15,23,42,0.95);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding: 0 32px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(8px);
}
.header-left { display: flex; align-items: center; gap: 12px; }
.header-logo { font-size: 22px; }
.header-title { font-size: 16px; font-weight: 600; color: #f8fafc; }
.header-right { display: flex; align-items: center; gap: 16px; }
.user-info { font-size: 13px; color: rgba(255,255,255,0.6); }
.user-role { 
  background: #1d4ed8; color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 11px; margin-left: 6px;
}
.btn-logout {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 6px;
  padding: 6px 14px;
  color: #94a3b8;
  font-size: 13px;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.2s;
}
.btn-logout:hover { background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.4); color: #fca5a5; }

/* 主内容 */
.main { max-width: 1200px; margin: 0 auto; padding: 40px 32px; }
.section-title { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 20px; letter-spacing: 1px; text-transform: uppercase; }

/* 应用卡片网格 */
.app-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}
.app-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 24px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.app-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, #3b82f6, #60a5fa);
  opacity: 0;
  transition: opacity 0.2s;
}
.app-card:hover {
  background: rgba(255,255,255,0.07);
  border-color: rgba(59,130,246,0.4);
  transform: translateY(-2px);
}
.app-card:hover::before { opacity: 1; }
.app-icon { font-size: 36px; margin-bottom: 12px; }
.app-name { font-size: 15px; font-weight: 600; color: #f1f5f9; margin-bottom: 6px; }
.app-desc { font-size: 12px; color: rgba(255,255,255,0.45); line-height: 1.5; margin-bottom: 12px; }
.app-version {
  font-size: 11px; color: rgba(255,255,255,0.25);
  position: absolute; bottom: 12px; right: 14px;
}

/* 底部 */
.footer {
  text-align: center;
  padding: 32px;
  color: rgba(255,255,255,0.2);
  font-size: 12px;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="header-logo">🔧</span>
    <span class="header-title">NetTool</span>
    <span style="color:rgba(255,255,255,0.25);font-size:13px;">网络工程师工具箱</span>
  </div>
  <div class="header-right">
    <span class="user-info">
      {{username}}<span class="user-role">{{role}}</span>
    </span>
    <a href="/logout/" class="btn-logout">退出登录</a>
  </div>
</div>

<div class="main">
  <div class="section-title">我的应用</div>
  <div class="app-grid">
    {{app_cards}}
  </div>
</div>

<div class="footer">
  NetTool &copy; {{year}} · 统一入口 · 所有应用共享登录
</div>

<script>
// 进入应用
function goApp(appPath) {
  window.location.href = '/' + appPath;
}
</script>

</body>
</html>
